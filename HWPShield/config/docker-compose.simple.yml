version: '3.8'

services:
  backend:
    build: ./backend
    container_name: hwpshield-backend
    ports:
      - "8000:8000"
    environment:
      - TEMP=/tmp
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: hwpshield-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: unless-stopped
